<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/items.css">
    <title>Add Item</title>
</head>
<body>
    <header>
        <div class="header">
            <div class="name">
                <a href="/"><p>Campus Lost & Found</p></a>
            </div>
            <div class="home-link">
                <a href="/"><p>Back to Home</p></a>
            </div>
        </div>
    </header>

    <style>
    .preview-img {
        display: none;
        width: 100%;
        max-height: 200px;
        object-fit: cover;
        margin-top: 10px;
        border-radius: 10px;
    }
</style>
<main class="login-page">
    <div class="login-card">
        <p class="login-title">Report an Item</p>
        <p class="login-subtitle">
            Help others by reporting a lost or found item on campus.
        </p>

        <!-- FORM -->
        <form class="login-form" action="/items/add" method="POST" enctype="multipart/form-data" onsubmit="handleSubmit(this)">

            <!-- Type -->
            <label for="type">Type</label>
            <select id="type" name="type" required>
                <option value="">Select</option>
                <option value="lost">Lost</option>
                <option value="found">Found</option>
            </select>

            <!-- Location -->
            <label for="location">Location</label>
            <input 
                type="text" 
                id="location" 
                name="location" 
                placeholder="Where was it lost/found?" 
                required
            >

            <!-- Description -->
            <label for="description">Description</label>
            <textarea 
                id="description" 
                name="description" 
                placeholder="Describe the item..." 
                rows="4"
                required
            ></textarea>

            <!-- Contact -->
            <label for="contact">Contact Info</label>
            <input 
                type="text" 
                id="contact" 
                name="contact" 
                placeholder="Phone" 
                required
            >
            
            <!-- Image Upload -->
            <label for="image">Upload Photo</label>
            <div class="file-upload">
                <label for="image" class="upload-btn">
                    Add Photo
                </label>
                <input 
                    type="file" 
                    id="image" 
                    name="image" 
                    accept="image/*" 
                    capture="environment"
                    onchange="previewImage(event)"
                >
            </div>

            <!-- Preview -->
            <img id="preview" class="preview-img" />

            <!-- Submit -->
            <button type="submit" id="submitBtn">Submit</button>

        </form>
    </div>
</main>

<script>
    function previewImage(event) {
        const img = document.getElementById('preview');
        img.src = URL.createObjectURL(event.target.files[0]);
        img.style.display = "block";
    }

    function handleSubmit(form) {
        const btn = document.getElementById("submitBtn");
        btn.innerText = "Uploading...";
        btn.disabled = true;
    }
</script>

</body>
</html>
